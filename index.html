<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-commandes.js"></script>

  <title>Commandes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/etabs.css">
  <link rel="stylesheet" href="css/commandes.css">
  <link rel="stylesheet" href="css/gerant.css">

  <link rel="icon" type="image/png" href="favicon.png">
</head>

<body>

  <div id="screenEtab" class="screen">
    <div class="etab-screen">
      <div class="etab-logo">🧾</div>
      <h1 class="etab-title">Commandes</h1>
      <p class="etab-sub">Quel etablissement ?</p>
      <div class="etab-cards" id="etabCards"></div>
      <button class="etab-switch-link" id="switchEtabBtn" style="display:none">Changer d etablissement</button>
    </div>
  </div>

  <div id="screenApp" class="screen" style="display:none">
    <div id="app">
      <header class="app-header">
        <div class="header-left">
          <button class="etab-pill" id="etabPill"></button>
          <div>
            <h1>Commandes</h1>
            <span class="week-label" id="weekLabel">...</span>
          </div>
        </div>

        <div class="header-right">
          <span id="saveStatus" class="save-status"></span>
          <button class="icon-btn" id="summaryBtn" title="Recapitulatif" style="display:none">📋</button>
          <button class="icon-btn icon-btn--close" id="closeAppBtn" title="Fermer">✕</button>
        </div>
      </header>

      <main id="mainContent">
        <div class="loading-state" id="loadingState">
          <div class="spinner"></div>
          <p>Chargement...</p>
        </div>

        <div id="productList" style="display:none"></div>
      </main>

      <div class="modal-overlay" id="summaryModal" style="display:none">
        <div class="modal">
          <div class="modal-header">
            <h2 id="summaryTitle">Recapitulatif</h2>
            <button class="icon-btn" id="closeModal">X</button>
          </div>

          <div class="modal-body" id="summaryContent"></div>

          <div class="modal-footer">
            <button class="copy-btn" id="copyBtn">📋 Copier et archiver</button>
            <button class="copy-btn copy-btn--a" id="copyBtnA" style="display:none">📋 Copier Pizza d'Oléron</button>
            <button class="copy-btn copy-btn--b" id="copyBtnB" style="display:none">📋 Copier Le Vesuvio</button>
            <button class="reset-btn" id="resetBtn">🗑 Vider</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="state.js"></script>
  <script src="data.js"></script>
  <script src="copy.js"></script>
  <script src="validation.js"></script>

  <script src="tri.js"></script>
  <script src="tri_pipeline.js"></script>
  <script src="regroupement.js"></script>

  <script src="rendu_produit.js"></script>
  <script src="rendu_fournisseur.js"></script>

  <script src="ui_ecran.js"></script>
  <script src="ui_accordion.js"></script>
  <script src="ui_accordion_gerant.js"></script>
  <script src="ui_qty.js"></script>

  <script src="ui_modals_view.js"></script>
  <script src="ui_modals_edit.js"></script>
  <script src="ui_modals_add.js"></script>

  <script src="versioning.js"></script>
  <script src="ui_rendu.js"></script>

  <script src="app.js"></script>

</body>
</html>
